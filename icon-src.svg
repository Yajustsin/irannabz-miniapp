<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14131c"/>
      <stop offset="55%" stop-color="#0b0a10"/>
      <stop offset="100%" stop-color="#100d08"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#e8c873" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8c873" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="60" y1="380" x2="452" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9a7420"/>
      <stop offset="42%" stop-color="#f7e2a3"/>
      <stop offset="70%" stop-color="#e9c662"/>
      <stop offset="100%" stop-color="#a37d2a"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="3" y="3" width="506" height="506" rx="110" fill="none" stroke="#e8c873" stroke-opacity="0.16" stroke-width="3"/>

  <!-- logo: ECG heartbeat + ascending bars -->
  <g transform="translate(86,150) scale(3.4)" fill="none">
    <polyline points="2,46 12,46 18,38 25,56 34,16 40,48 50,48"
      stroke="url(#gold)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="56" y="38" width="11" height="28" rx="2.5" fill="url(#gold)"/>
    <rect x="70" y="26" width="11" height="40" rx="2.5" fill="url(#gold)"/>
    <rect x="84" y="12" width="11" height="54" rx="2.5" fill="url(#gold)"/>
  </g>
</svg>
